name: CI/CD Pipeline

on:
  push:
    branches:
      - "**"

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: ${{ vars.POSTGRES_IMAGE }}
        env:
          POSTGRES_DB: ${{ vars.DB_NAME }}
          POSTGRES_USER: ${{ vars.DB_USER }}
          POSTGRES_PASSWORD: ${{ secrets.DB_PASS }}
        ports:
          - ${{ vars.DB_PORT }}:${{ vars.DB_PORT }}
        options: >-
          --health-cmd "pg_isready -U ${{ vars.DB_USER }} -d ${{ vars.DB_NAME }}"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: ${{ vars.REDIS_IMAGE }}
        ports:
          - ${{ vars.REDIS_PORT }}:${{ vars.REDIS_PORT }}

    env:
      DB_HOST: localhost
      DB_PORT: ${{ vars.DB_PORT }}
      DB_NAME: ${{ vars.DB_NAME }}
      DB_USER: ${{ vars.DB_USER }}
      DB_PASS: ${{ secrets.DB_PASS }}

      REDIS_HOST: localhost
      REDIS_PORT: ${{ vars.REDIS_PORT }}

      DATABASE_URL: postgresql+asyncpg://${{ vars.DB_USER }}:${{ secrets.DB_PASS }}@localhost:${{ vars.DB_PORT }}/${{ vars.DB_NAME }}

      SECRET_KEY: ${{ secrets.SECRET_KEY }}

      PYTHONPATH: .

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ vars.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for Postgres
        run: |
          until pg_isready -h localhost -p ${{ vars.DB_PORT }} -U ${{ vars.DB_USER }}; do
            echo "Waiting for postgres..."
            sleep 2
          done

      - name: Run migrations
        run: alembic upgrade head

      - name: Run tests
        run: |
          if [ -d "tests" ] && [ -n "$(find tests/ -name '*.py' -not -name '__init__.py')" ]; then
            pytest tests/ -v --tb=short
          else
            echo "No tests found — migration smoke test passed."
          fi

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/build-push-action@v5
        with:
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/${{ vars.DOCKER_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
