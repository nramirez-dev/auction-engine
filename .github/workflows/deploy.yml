name: CI/CD Pipeline

on:
  push:
    branches:
      - '**'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: auction
          POSTGRES_USER: auction_user
          POSTGRES_PASSWORD: auction_pass_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U auction_user -d auction"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: auction
      DB_USER: auction_user
      DB_PASS: auction_pass_test
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      REDIS_PASS: ''
      DATABASE_URL: postgresql+asyncpg://auction_user:auction_pass_test@localhost:5432/auction
      SECRET_KEY: test_secret_key
      PYTHONPATH: .

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run migrations
        run: alembic upgrade head

      - name: Run tests
        run: |
          if [ -d "tests" ] && [ -n "$(find tests/ -name '*.py' -not -name '__init__.py')" ]; then
            pytest tests/ -v --tb=short
          else
            echo "No tests found — migration smoke test passed."
          fi

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/build-push-action@v5
        with:
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/auction-engine:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
