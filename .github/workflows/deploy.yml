name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        env:
          DB_NAME: ${{ vars.DB_NAME }}
          DB_USER: ${{ vars.DB_USER }}
          DB_PASS: ${{ secrets.TEST_DB_PASS }}
          DB_PORT: ${{ vars.DB_PORT }}
          REDIS_PORT: ${{ vars.REDIS_PORT }}
          SECRET_KEY: ${{ secrets.TEST_SECRET_KEY }}
        run: |
          {
            printf 'POSTGRES_DB=%s\n'       "${DB_NAME}"
            printf 'POSTGRES_USER=%s\n'     "${DB_USER}"
            printf 'POSTGRES_PASSWORD=%s\n' "${DB_PASS}"
            printf 'REDIS_PASS=%s\n'        "${DB_PASS}"
            printf 'DB_HOST=postgres\n'
            printf 'DB_PORT=%s\n'           "${DB_PORT}"
            printf 'DB_NAME=%s\n'           "${DB_NAME}"
            printf 'DB_USER=%s\n'           "${DB_USER}"
            printf 'DB_PASS=%s\n'           "${DB_PASS}"
            printf 'REDIS_HOST=redis\n'
            printf 'REDIS_PORT=%s\n'        "${REDIS_PORT}"
            printf 'SECRET_KEY=%s\n'        "${SECRET_KEY}"
            printf 'DEBUG=false\n'
            printf 'DATABASE_URL=postgresql+asyncpg://%s:%s@postgres:%s/%s\n' \
              "${DB_USER}" "${DB_PASS}" "${DB_PORT}" "${DB_NAME}"
          } > .env

      - name: Start services
        run: docker compose up -d postgres redis

      - name: Wait for PostgreSQL
        run: |
          n=0
          until docker compose exec -T postgres \
            pg_isready -U ${{ vars.DB_USER }} -d ${{ vars.DB_NAME }}; do
            n=$((n + 1))
            if [ "$n" -ge 30 ]; then
              echo "Timed out waiting for postgres"
              docker compose logs postgres
              exit 1
            fi
            echo "Waiting for postgres... (${n}/30)"
            sleep 2
          done

      - name: Wait for Redis
        env:
          REDIS_PASS: ${{ secrets.TEST_DB_PASS }}
        run: |
          n=0
          until docker compose exec -T redis \
            redis-cli -a "${REDIS_PASS}" ping | grep -q PONG; do
            n=$((n + 1))
            if [ "$n" -ge 30 ]; then
              echo "Timed out waiting for redis"
              docker compose logs redis
              exit 1
            fi
            echo "Waiting for redis... (${n}/30)"
            sleep 2
          done

      - name: Build API
        run: docker compose build api

      - name: Run migrations
        run: docker compose run --rm api alembic upgrade head

      - name: Run tests
        run: docker compose run --rm api pytest

      - name: Teardown
        if: always()
        run: docker compose down -v

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/nramirez-dev/auction-engine:latest
            ghcr.io/nramirez-dev/auction-engine:${{ github.sha }}

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          npm install -g @railway/cli
          railway redeploy --service api --yes
