upstream auction_api {
    least_conn;
    server api:8000;
    # "api" resolves to Docker's internal service VIP.
    # Docker's iptables/NAT rules distribute connections across all replicas
    # started with --scale api=N. least_conn biases new connections toward
    # the replica with the fewest active connections as seen by nginx.
}

server {
    listen 80;

    # WebSocket proxy
    location /ws/ {
        proxy_pass http://auction_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # Redirect /dashboard -> /dashboard/
    location = /dashboard {
        return 301 /dashboard/;
    }

    # React / SPA dashboard
    location /dashboard/ {
        alias /usr/share/nginx/html/dashboard/;
        index index.html;
        try_files $uri $uri/ /dashboard/index.html;
    }

    # API reverse proxy
    location / {
        proxy_pass http://auction_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}