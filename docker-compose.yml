services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    # No host port — accessible only within the Docker network
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - auction-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # No host port — accessible only within the Docker network
    command: redis-server --requirepass ${REDIS_PASS} --appendonly yes
    environment:
      # REDISCLI_AUTH lets redis-cli authenticate without exposing the password in CLI args
      REDISCLI_AUTH: ${REDIS_PASS}
    volumes:
      - redisdata:/data
    networks:
      - auction-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
    # container_name intentionally omitted — a static name blocks --scale
    # (every replica must have a unique container name).
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - auction-network
    restart: unless-stopped
    # Source volume mounts removed — code is baked into the image.
    # For dev hot-reload, add them back via docker-compose.override.yml:
    #   volumes:
    #     - ./src:/app/src
    #     - ./migrations:/app/migrations
    #     - ./tests:/app/tests
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
    # No host port mapping — multiple replicas cannot bind the same host port.
    # Nginx reaches all replicas through Docker's internal VIP for the api service.
    # For local debugging of a single replica use docker-compose.override.yml:
    #   ports:
    #     - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  nginx:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - auction-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/dashboard/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  auction-network:
    driver: bridge

volumes:
  pgdata:
    external: false
  redisdata:
    external: false
